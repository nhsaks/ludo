<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ludo Game - Firebase + PeerJS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    #game-board {
      background-color: #f2f2f2;
      height: 400px;
      border: 2px dashed #aaa;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container mt-5" id="auth-section">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4 shadow">
        <h4 class="mb-3 text-center">🎲 Ludo Game Login</h4>
        <input type="email" class="form-control mb-2" placeholder="Email" id="email">
        <input type="password" class="form-control mb-3" placeholder="Password" id="password">
        <button class="btn btn-success w-100 mb-2" onclick="login()">Login</button>
        <button class="btn btn-secondary w-100" onclick="register()">Register</button>
      </div>
    </div>
  </div>
</div>

<div class="container mt-5 d-none" id="lobby-section">
  <div class="card p-4 shadow">
    <h4 class="mb-3">🎮 Game Lobby</h4>
    <div class="mb-3">
      <input type="text" class="form-control" placeholder="Room ID" id="roomId">
    </div>
    <button class="btn btn-primary mb-2 w-100" onclick="createRoom()">Create Room</button>
    <button class="btn btn-info w-100" onclick="joinRoom()">Join Room</button>
    <div class="mt-4 alert alert-warning d-none" id="voice-status">🎤 Voice Chat: Connecting...</div>
  </div>
</div>

<div class="container mt-5 d-none" id="game-section">
  <div class="card p-4 shadow">
    <h4 class="mb-3">🧩 Ludo Game</h4>
    <div id="game-board">Game Board Here</div>
    <div class="mt-3 d-flex justify-content-between">
      <button class="btn btn-success" onclick="rollDice()">🎲 Roll Dice</button>
      <button class="btn btn-danger" onclick="leaveGame()">🚪 Leave Game</button>
    </div>
  </div>
</div>

<script>
  // Placeholder functions
  function login() {
    document.getElementById('auth-section').classList.add('d-none');
    document.getElementById('lobby-section').classList.remove('d-none');
  }

  function register() {
    alert("Register function will use Firebase Auth");
  }

  function createRoom() {
    alert("Create Room using Firebase Realtime Database");
    document.getElementById('lobby-section').classList.add('d-none');
    document.getElementById('game-section').classList.remove('d-none');
    document.getElementById('voice-status').classList.remove('d-none');
  }

  function joinRoom() {
    alert("Join Room using Firebase matchmaking");
    document.getElementById('lobby-section').classList.add('d-none');
    document.getElementById('game-section').classList.remove('d-none');
    document.getElementById('voice-status').classList.remove('d-none');
  }

  function rollDice() {
    alert("Dice rolled! Update game state in Firebase.");
  }

  function leaveGame() {
    location.reload();
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
